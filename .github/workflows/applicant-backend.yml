name: Applicant Backend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'goHire/applicant/backend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'goHire/applicant/backend/**'

defaults:
  run:
    working-directory: goHire/applicant/backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'
    - name: Install dependencies
      run: npm install
    - name: Run tests
      env:
        MONGO_URI_TEST: ${{ secrets.MONGO_URI_TEST }}
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        STRIPE_SECRET_KEY: dummy_test_key
        STRIPE_WEBHOOK_SECRET: dummy_test_key
        EMAILJS_SERVICE_ID: dummy_test_key
        EMAILJS_TEMPLATE_ID: dummy_test_key
        EMAILJS_PUBLIC_KEY: dummy_test_key
        EMAILJS_PRIVATE_KEY: dummy_test_key
      run: npm test
