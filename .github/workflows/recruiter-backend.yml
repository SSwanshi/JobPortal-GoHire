name: Recruiter Backend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'goHire/recruiter/backend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'goHire/recruiter/backend/**'

defaults:
  run:
    working-directory: goHire/recruiter/backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'
    - name: Install dependencies
      run: npm install
    - name: Run tests
      env:
        MONGO_URI_TEST: ${{ secrets.MONGO_URI_TEST }}
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      run: npm test
